document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ow:Date.now() }), 1000);\n    this._resize = () => this.setState({\n      phoneScale: Math.min(1, (window.innerHeight - 48) / 866),\n      shellScale: Math.min(1, (window.innerHeight - 40) / 884, (window.innerWidth - 40) / 1190),\n    });\n    window.addEventListener('resize', this._resize);\n  }\n  componentWillUnmount(){ clearInterval(this._t); window.removeEventListener('resize', this._resize); }\n\n  euro(n){ return '€' + n.toFixed(2).replace('.', ','); }\n  fmtClock(ms){ const d=new Date(ms); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }\n  countdown(off){\n    const target = this.mountTime + off*60000;\n    let ms = target - this.state.now;\n    if (ms < 0) ms = 0;\n    const mins = Math.floor(ms/60000);\n    const urgent = mins < 60;\n    let text;\n    if (mins <= 0) text = 'Ending now';\n    else if (mins < 60) text = mins + ' min left';\n    else { const h=Math.floor(mins/60), m=mins%60; text = h+'h '+(m? m+'m':'')+' left'; }\n    return { text, urgent, clock:this.fmtClock(target), mins };\n  }\n\n  set(p){ this.setState(p); }\n  enterShopper = () => this.setState({ mode:'shopper', sScreen:'ob1' });\n  enterRetailer = () => this.setState({ mode:'retailer', rScreen:'login' });\n  backToLanding = () => this.setState({ mode:'landing' });\n\n  // onboarding\n  ob1Next = () => this.setState({ sScreen:'ob2' });\n  ob2Next = () => this.setState({ sScreen:'ob3' });\n  allowLoc = () => this.setState({ sScreen:'home' });\n  skipOb   = () => this.setState({ sScreen:'home' });\n\n  // nav\n  goHome = () => this.setState({ sScreen:'home', sheetOpen:false });\n  goMap = () => this.setState({ sScreen:'map' });\n  goSaved = () => this.setState({ sScreen:'saved' });\n  goProfile = () => this.setState({ sScreen:'profile' });\n\n  openDetail(it){ this.setState({ selItemId:it.id, detailFrom:this.state.sScreen, sScreen:'detail' }); }\n  backFromDetail = () => this.setState({ sScreen:this.state.detailFrom });\n  openStore(s){ this.setState({ selStoreId:s.id, sScreen:'store', sheetOpen:false }); }\n  openStoreFromDetail = () => { const it=this.items.find(i=>i.id===this.state.selItemId); this.setState({ selStoreId:it.storeId, sScreen:'store' }); };\n\n  reserveNow = () => {\n    const it = this.items.find(i=>i.id===this.state.selItemId);\n    const code = '#' + Math.random().toString(36).slice(2,6).toUpperCase();\n    const cd = this.countdown(it.off);\n    const store = this.stores.find(s=>s.id===it.storeId);\n    const res = { code, item:it, clock:cd.clock, store };\n    this.setState({ lastRes:res, sScreen:'reserve', confetti:(this.props.celebrateReservation !== false) });\n    setTimeout(()=>this.setState({ confetti:false }), 2600);\n  };\n  reserveDone = () => {\n    const r = this.state.lastRes;\n    const newRes = { code:r.code, name:r.item.name, store:r.store.name, status:'upcoming', saved:+(r.item.orig-r.item.price).toFixed(2), kg:0.4 };\n    this.setState({ reservations:[newRes, ...this.state.reservations], sScreen:'saved' });\n  };\n  reserveHome = () => this.setState({ sScreen:'home' });\n\n  selFilter(f){ this.setState({ filter:f }); }\n  onQuery = (e) => this.setState({ query:e.target.value });\n\n  mapSelect(s){ this.setState({ mapSel:s.id, sheetOpen:true }); }\n  closeSheet = () => this.setState({ sheetOpen:false });\n  viewAllFromSheet = () => this.setState({ selStoreId:this.state.mapSel, sScreen:'store', sheetOpen:false });\n  toggleFollow(id){ const f={...this.state.follow}; f[id]=!f[id]; this.setState({ follow:f }); }\n  toggleFollowSel = () => this.toggleFollow(this.state.selStoreId);\n  toggleNotif(k){ const n={...this.state.notif}; n[k]=!n[k]; this.setState({ notif:n }); }\n\n  // retailer\n  retailerLogin = () => this.setState({ rScreen:'dash' });\n  rGo(s){ this.setState({ rScreen:s }); }\n  openNew = () => this.setState({ rScreen:'new', newL:{ name:'', cat:'Bakery', orig:'', pct:(this.props.defaultDiscount ?? 50), qty:'', bbd:'25.6.2026', from:'18:00', to:'21:00', photo:false } });\n  setNew(k,v){ this.setState({ newL:{ ...this.state.newL, [k]:v } }); }\n  submitListing = () => {\n    const n=this.state.newL;\n    const tintMap={ 'Bakery':'linear-gradient(135deg,#F1E3CC,#E2C79E)','Meat & Fish':'linear-gradient(135deg,#F4DBD3,#E6B3A4)','Dairy':'linear-gradient(135deg,#EFEFE6,#D8D8C6)','Produce':'linear-gradient(135deg,#DFEAD0,#C2D9A8)' };\n    const l={ id:'l'+Date.now(), name:n.name||'New item', cat:n.cat, pct:n.pct, qty:+n.qty||1, reserved:0, from:n.from, to:n.to, status:'Active', tint:tintMap[n.cat]||tintMap.Bakery };\n    this.setState({ listings:[l, ...this.state.listings], rScreen:'listings', rToast:true });\n    setTimeout(()=>this.setState({ rToast:false }), 2600);\n  };\n  endListing(id){ this.setState({ listings:this.state.listings.map(l=>l.id===id?{...l,status:'Expired'}:l) }); }\n  markRes(code,st){ this.setState({ incoming:this.state.incoming.map(r=>r.code===code?{...r,status:st}:r) }); }\n  setRTab(t){ this.setState({ rTab:t }); }\n\n  renderVals(){\n    const st = this.state;\n    const acc = '#1E3D2C', org='#D62828';\n    // --- shopper feed ---\n    const cats = ['All','Meat & Fish','Dairy','Bakery','Produce','Ending soon'];\n    let feed = this.items.slice();\n    if (st.filter==='Ending soon') feed = feed.filter(i=>this.countdown(i.off).mins < 70).sort((a,b)=>this.countdown(a.off).mins-this.countdown(b.off).mins);\n    else if (st.filter!=='All') feed = feed.filter(i=>i.cat===st.filter);\n    if (st.query.trim()) { const q=st.query.toLowerCase(); feed = feed.filter(i=> (i.name+' '+i.en+' '+this.storeName(i.storeId)).toLowerCase().includes(q)); }\n    const self = this;\n    const decorate = (i) => {\n      const cd = this.countdown(i.off);\n      return { ...i, tint: i.img ? `url(\"${i.img}\") center/cover no-repeat` : i.tint, storeName:this.storeName(i.storeId), origStr:this.euro(i.orig), priceStr:this.euro(i.price), pctStr:'-'+i.pct+'%',\n        cd, cdColor: cd.urgent? org : '#5A5A52', cdBg: cd.urgent? 'rgba(214,40,40,.12)':'#F  v:188}, {l:'Wk 24', v:165}, {l:'Wk 25', v:243} ];\n    const maxW = 260;\n    const bars = weeks.map(w=>({ ...w, h:Math.round(w.v/maxW*120), vStr:'€'+w.v }));\n    const catShare = [ {l:'Bakery', v:38, c:'#1E3D2C'}, {l:'Meat & Fish', v:29, c:'#4E6B3C'}, {l:'Dairy', v:21, c:'#D62828'}, {l:'Produce', v:12, c:'#F2B134'} ];\n    const rTabs = [ {k:'profile',l:'Store profile'},{k:'staff',l:'Staff accounts'},{k:'notif',l:'Notifications'},{k:'terms',l:'Partnership terms'} ];\n    const rTabsV = rTabs.map(t=>({ ...t, active:st.rTab===t.k, sel:()=>self.setRTab(t.k) }));\n\n    return {\n      phoneScale: st.phoneScale || 1,\n      shellScale: st.shellScale || 1,\n      isLanding: st.mode==='landing', isShopper: st.mode==='shopper', isRetailer: st.mode==='retailer',\n      enterShopper:this.enterShopper, enterRetailer:this.enterRetailer, backToLanding:this.backToLanding,\n      // shopper screen flags\n      scOb1: st.sScreen==='ob1', scOb2: st.sScreen==='ob2', scOb3: st.sScreen==='ob3',\n      scHome: st.sScreen==='home', scDetail: st.sScreen==='detail', scReserve: st.sScreen==='reserve',\n      scMap: st.sScreen==='map', scStore: st.sScreen==='store', scSaved: st.sScreen==='saved', scProfile: st.sScreen==='profile',\n      showNav: ['home','map','saved','profile','store'].includes(st.sScreen),\n      navHomeColor: st.sScreen==='home'?acc:'#B7B7AE', navMapColor: st.sScreen==='map'?acc:'#B7B7AE',\n      navSavedColor: st.sScreen==='saved'?acc:'#B7B7AE', navProfileColor: st.sScreen==='profile'?acc:'#B7B7AE',\n      ob1Next:this.ob1Next, ob2Next:this.ob2Next, allowLoc:this.allowLoc, skipOb:this.skipOb,\n      goHome:this.goHome, goMap:this.goMap, goSaved:this.goSaved, goProfile:this.goProfile,\n      greeting:'Hei, Aino', newCount:'12 new discounts near you today',\n      query:st.query, onQuery:this.onQuery, chips, feed:feedV, feedEmpty:feedV.length===0,\n      sel:selV, backFromDetail:this.backFromDetail, reserveNow:this.reserveNow, openStoreFromDetail:this.openStoreFromDetail,\n      lastRes:lastResV, reserveDone:this.reserveDone, reserveHome:this.reserveHome, confetti:confettiPieces, showConfetti:st.confetti,\n      mapStores, mapSel, sheetOpen:st.sheetOpen, sheetItems, closeSheet:this.closeSheet, viewAllFromSheet:this.viewAllFromSheet,\n      selStore, storeItems, isFollowed, toggleFollowSel:this.toggleFollowSel, followLabel:isFollowed?'Following':'Follow this store',\n      reservations, savedTotal, kgTotal, ringPct, ringDash, savedTotalStr:'€'+savedTotal,\n      notif:st.notif, toggleNew:()=>self.toggleNotif('newAlerts'), toggleRem:()=>self.toggleNotif('reminder'), toggleNear:()=>self.toggleNotif('nearby'),\n      // retailer\n      rLogin: st.rScreen==='login', rDash: st.rScreen==='dash', rNew: st.rScreen==='new',\n      rListings: st.rScreen==='listings', rRes: st.rScreen==='reservations', rAna: st.rScreen==='analytics', rSet: st.rScreen==='settings',\n      showShell: st.mode==='retailer' && st.rScreen!=='login',\n      retailerLogin:this.retailerLogin, openNew:this.openNew,\n      navDash:()=>self.rGo('dash'), navList:()=>self.rGo('listings'), navRes:()=>self.rGo('reservations'), navAna:()=>self.rGo('analytics'), navSet:()=>self.rGo('settings'),\n      dashActive: st.rScreen==='dash', listActive: st.rScreen==='listings', resActive: st.rScreen==='reservations', anaActive: st.rScreen==='analytics', setActive: st.rScreen==='settings',\n      dashCol: st.rScreen==='dash' ? '#1E3D2C' : '#9A9A92', listCol: st.rScreen==='listings' ? '#1E3D2C' : '#9A9A92', resCol: st.rScreen==='reservations' ? '#1E3D2C' : '#9A9A92', anaCol: st.rScreen==='analytics' ? '#1E3D2C' : '#9A9A92', setCol: st.rScreen==='settings' ? '#1E3D2C' : '#9A9A92',\n      listings, incoming, pendingCount, rToast:st.rToast,\n      nl, nlNoPhoto:!st.newL.photo, nlDiscountStr, nlNewPrice, presets, catOpts,\n      onNlName:(e)=>self.setNew('name',e.target.value), onNlOrig:(e)=>self.setNew('orig',e.target.value), onNlQty:(e)=>self.setNew('qty',e.target.value),\n      onNlBbd:
